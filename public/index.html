<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Directo Render</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Panel directo Render</h1>
        <div class="muted">Ingresa tu APP_TOKEN para usar el panel directo</div>
      </div>
      <button class="alt" id="reloadBtn">Actualizar</button>
    </div>

    <div class="card">
      <input id="tokenInput" placeholder="Pega aquí tu APP_TOKEN" />
      <button id="saveTokenBtn">Guardar token</button>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <h2>Nueva sesión</h2>
          <input id="newSessionId" placeholder="ventas, soporte, recepcion" />
          <input id="newSessionLabel" placeholder="Etiqueta visible" />
          <button id="createSessionBtn">Crear sesión</button>
          <div class="statusbox" id="qrStatus">Aún no se ha solicitado QR.</div>
          <div class="qr" id="qrBox">
            <img id="qrImg" alt="QR">
            <div style="margin-top:10px;font-weight:600">Escanea este QR con WhatsApp Business</div>
          </div>
        </div>

        <div class="card">
          <h2>Sesiones</h2>
          <div class="list" id="sessionList"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <div class="top" style="margin:0 0 16px">
            <div>
              <h2 id="title">Selecciona una sesión</h2>
              <div class="muted" id="status">Sin sesión activa</div>
            </div>
            <div class="actions">
              <button class="alt" id="restartBtn" disabled>Reiniciar</button>
              <button class="danger" id="logoutBtn" disabled>Cerrar sesión</button>
            </div>
          </div>

          <div class="row">
            <div>
              <input id="agentLabel" placeholder="Etiqueta">
              <textarea id="prompt" rows="10" placeholder="Prompt del agente"></textarea>
              <label><input type="checkbox" id="active" checked style="width:auto;margin-right:8px">Bot activo</label>
              <button id="saveBtn" disabled>Guardar cambios</button>
            </div>

            <div>
              <input id="number" placeholder="5215512345678">
              <textarea id="message" rows="6" placeholder="Mensaje manual"></textarea>
              <button id="sendBtn" disabled>Enviar mensaje</button>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Historial</h2>
          <div class="msglog" id="log">Sin historial.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
